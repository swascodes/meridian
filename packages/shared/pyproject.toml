[project]
name = "meridian-shared"
version = "0.1.0"
description = "Shared models, utilities, and clients for Meridian services"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5,<3",
    "pydantic-settings>=2.1,<3",
    "sqlalchemy[asyncio]>=2.0,<3",
    "asyncpg>=0.29,<1",
    "alembic>=1.13,<2",
    "redis[hiredis]>=5.0,<6",
    "stellar-sdk>=9.0,<10",
    "structlog>=24.1,<25",
    "orjson>=3.9,<4",
    "httpx>=0.27,<1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["meridian_shared*"]
