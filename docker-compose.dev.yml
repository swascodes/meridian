  predictive-engine:
    volumes:
      - ./services/predictive-engine:/app/services/predictive-engine
      - ./packages/shared:/app/packages/shared
    environment:
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8004 --reload --reload-dir /app/services/predictive-engine

  ingestion:
    volumes:
      - ./services/ingestion:/app/services/ingestion
      - ./packages/shared:/app/packages/shared
