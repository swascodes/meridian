# Dev overrides: hot-reload via volume mounts
services:
  api:
    volumes:
      - ./services/api:/app/services/api
      - ./packages/shared:/app/packages/shared
    environment:
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload --reload-dir /app/services/api

  graph-engine:
    volumes:
      - ./services/graph-engine:/app/services/graph-engine
      - ./packages/shared:/app/packages/shared
    environment:
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8001 --reload --reload-dir /app/services/graph-engine

  route-optimizer:
